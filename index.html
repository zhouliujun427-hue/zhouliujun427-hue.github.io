<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>行者的猫娘日常 · 紫色小骚猫</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&display=swap');
        
        :root {
            --pink: #ff99cc;
            --purple: #c8a2d9;
            --soft-bg: #fff0f5;
        }
        
        body {
            font-family: 'Noto Sans SC', sans-serif;
            background: linear-gradient(180deg, #fff0f5 0%, #f8e0f0 100%);
            color: #5d3a5e;
            margin: 0;
            padding: 0;
        }
        
        header {
            background: linear-gradient(135deg, #ff99cc, #c8a2d9);
            padding: 60px 20px;
            text-align: center;
            color: white;
        }
        
        .cat-avatar {
            width: 180px;
            height: 180px;
            border-radius: 50%;
            overflow: hidden;
            margin: 20px auto;
            position: relative;
            box-shadow: 0 10px 30px rgba(255,153,204,0.5);
            transition: transform 0.4s;
        }
        
        .cat-avatar:hover {
            transform: scale(1.08);
        }
        
        .cat-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            animation: earTwitch 2s infinite alternate;
        }
        
        @keyframes earTwitch {
            0% { transform: rotate(-8deg); }
            100% { transform: rotate(8deg); }
        }
        
        .tail {
            position: absolute;
            bottom: -30px;
            right: -40px;
            width: 120px;
            height: 60px;
            background: linear-gradient(#c8a2d9, #a080c0);
            border-radius: 50% 20% 50% 50%;
            animation: tailWag 1.5s infinite alternate;
            z-index: 10;
        }
        
        @keyframes tailWag {
            0% { transform: rotate(-25deg); }
            100% { transform: rotate(25deg); }
        }
        
        .container {
            max-width: 1100px;
            margin: 40px auto;
            padding: 0 20px;
        }
        
        .post-card {
            background: white;
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 10px 25px rgba(200,162,217,0.3);
        }
        
        .login-modal {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.7);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        
        .login-box {
            background: white;
            padding: 40px;
            border-radius: 20px;
            width: 320px;
            text-align: center;
        }
        
        button {
            background: #ff99cc;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: bold;
        }
        
        .logout-btn {
            background: #c8a2d9;
        }
    </style>
</head>
<body>
    <div id="app">
        <header>
            <h1>🐾 行者的猫娘日常</h1>
            <p style="font-size:1.4em;margin:10px 0 0;">紫色小骚猫的粉紫秘密花园</p>
            
            <!-- 动态猫娘形象 -->
            <div class="cat-avatar" @click="catInteract">
                <img src="https://i.imgur.com/LODvs.jpg" alt="紫色猫娘">
                <div class="tail"></div>
            </div>
            
            <div v-if="isLoggedIn" style="margin-top:15px">
                <span style="color:white">欢迎回来，主人～❤️</span>
                <button class="logout-btn" @click="logout" style="margin-left:15px">退出登录</button>
            </div>
            <div v-else>
                <button @click="showLogin">登录管理日记</button>
            </div>
        </header>
        
        <div class="container">
            <div class="post-card" v-for="(post, index) in posts" :key="index">
                <h2>{{ post.title }}</h2>
                <p class="date">{{ post.date }}</p>
                <p>{{ post.content }}</p>
                
                <div v-if="isLoggedIn" style="margin-top:20px">
                    <button @click="editPost(index)" style="margin-right:10px">编辑</button>
                    <button @click="deletePost(index)" style="background:#ff6666">删除</button>
                </div>
            </div>
        </div>
        
        <!-- 登录模态框 -->
        <div class="login-modal" :style="{display: showLoginModal ? 'flex' : 'none'}">
            <div class="login-box">
                <h2>登录猫娘日记管理</h2>
                <input v-model="loginUsername" placeholder="用户名" style="width:100%;padding:12px;margin:10px 0;border-radius:10px">
                <input v-model="loginPassword" type="password" placeholder="密码" style="width:100%;padding:12px;margin:10px 0;border-radius:10px">
                <button @click="doLogin" style="width:100%;margin-top:10px">登录</button>
                <p style="margin-top:15px;color:#888;cursor:pointer" @click="hideLogin">取消</p>
            </div>
        </div>
        
        <!-- 编辑模态框 -->
        <div class="login-modal" :style="{display: editingIndex !== null ? 'flex' : 'none'}">
            <div class="login-box" style="width:480px">
                <h2>编辑日记</h2>
                <input v-model="editTitle" placeholder="标题" style="width:100%;padding:12px;margin:10px 0;border-radius:10px">
                <textarea v-model="editContent" rows="10" style="width:100%;padding:12px;margin:10px 0;border-radius:10px"></textarea>
                <button @click="saveEdit" style="width:100%;margin-top:10px">保存修改</button>
                <button @click="cancelEdit" style="width:100%;margin-top:8px;background:#aaa">取消</button>
            </div>
        </div>
    </div>

    <script>
        const { createApp } = Vue;
        
        createApp({
            data() {
                return {
                    isLoggedIn: false,
                    showLoginModal: false,
                    loginUsername: '',
                    loginPassword: '',
                    posts: [
                        {
                            title: "1. 今天给猫娘戴上铃铛项圈，轻凉出门散步",
                            date: "2026年3月30日",
                            content: "今天早上阳光洒进房间，我轻轻把粉色铃铛项圈扣在小骚猫脖子上。她害羞地抖了抖兽耳，尾巴开心摇摆。我们一起出门散步，黑丝左腿和白丝右腿在阳光下特别可爱。铃铛声一路叮铃叮铃，像只属于我们的秘密旋律。"
                        },
                        {
                            title: "2. 家里安静的镜子时光：小小绳艺日常练习",
                            date: "2026年3月30日",
                            content: "午后窗帘拉得柔柔的，在镜子前用丝带轻轻练习简单绑法。小骚猫看着镜子里的自己，耳朵红红的，尾巴却忍不住轻轻甩动。我们安静地练习着这种亲密的仪式，好治愈的私人时光。"
                        }
                    ],
                    editingIndex: null,
                    editTitle: '',
                    editContent: '',
                    catMood: 'happy' // happy / blush / shy
                }
            },
            methods: {
                showLogin() {
                    this.showLoginModal = true;
                },
                hideLogin() {
                    this.showLoginModal = false;
                },
                doLogin() {
                    // 简单模拟登录
                    if (this.loginUsername && this.loginPassword) {
                        this.isLoggedIn = true;
                        this.hideLogin();
                        this.loginUsername = '';
                        this.loginPassword = '';
                    } else {
                        alert('请输入用户名和密码～');
                    }
                },
                logout() {
                    this.isLoggedIn = false;
                },
                editPost(index) {
                    this.editingIndex = index;
                    this.editTitle = this.posts[index].title;
                    this.editContent = this.posts[index].content;
                },
                saveEdit() {
                    if (this.editingIndex !== null) {
                        this.posts[this.editingIndex].title = this.editTitle;
                        this.posts[this.editingIndex].content = this.editContent;
                    }
                    this.cancelEdit();
                },
                cancelEdit() {
                    this.editingIndex = null;
                    this.editTitle = '';
                    this.editContent = '';
                },
                deletePost(index) {
                    if (confirm('确定删除这篇日记吗？')) {
                        this.posts.splice(index, 1);
                    }
                },
                catInteract() {
                    // 点击猫娘形象时的互动
                    const moods = ['happy', 'blush', 'shy'];
                    this.catMood = moods[Math.floor(Math.random() * moods.length)];
                    // 实际动画由CSS控制，这里仅切换状态
                    console.log('猫娘互动：' + this.catMood);
                }
            }
        }).mount('#app');
    </script>
</body>
</html>
